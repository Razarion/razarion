apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: razarion-cdn-config
spec:
  timeoutSec: 3600    # 1h - required for WebSocket connections (default 30s kills idle sockets)
  cdn:
    enabled: true
    cachePolicy:
      includeHost: true
      includeProtocol: true
      includeQueryString: false
    # Respektiert Cache-Control vom Origin. Statische Assets (WebMvcConfiguration
    # setzt Cache-Control: public, max-age=86400 für /*.js etc.) werden weiterhin
    # gecached. /rest/* und /editor/* setzen Cache-Control: no-store via
    # NoCacheRestFilter, damit POST-Responses nicht durch CDN abgefangen werden.
    cacheMode: USE_ORIGIN_HEADERS
    defaultTtl: 86400        # 24h fallback, wenn Origin keine TTL liefert
    maxTtl: 604800           # 7 Tage hard cap
    clientTtl: 86400         # Browser Cache 24h
  healthCheck:
    requestPath: /actuator/health/liveness
    port: 8080
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 5
