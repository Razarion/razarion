<div class="flex flex-col gap-3 w-md">
  <div class="flex items-center gap-2">
    <p-checkbox [(ngModel)]="showUnitNames" [binary]="true" inputId="showUnitNames"></p-checkbox>
    <label for="showUnitNames">Show unit names</label>
  </div>

  <div class="flex items-center gap-2">
    <p-checkbox [(ngModel)]="showTips" [binary]="true" inputId="showTips"></p-checkbox>
    <label for="showTips">Show tips</label>
  </div>

  <div class="flex items-center gap-2">
    <p-checkbox [(ngModel)]="showQuestVisualization" [binary]="true" inputId="showQuestVisualization"></p-checkbox>
    <label for="showQuestVisualization">Show quest area</label>
  </div>

  <hr class="border-surface-600 my-1">

  <p-button label="Give up base"
            icon="pi pi-flag"
            severity="danger"
            [outlined]="true"
            (onClick)="showSurrenderWarning = true">
  </p-button>
</div>

<p-dialog header="Give up base?" [(visible)]="showSurrenderWarning" [modal]="true" [closable]="true"
          appendTo="body" [style]="{ width: '32rem', maxWidth: '90vw' }">
  <div class="flex flex-col gap-4">
    <div class="flex items-start gap-3">
      <i class="pi pi-exclamation-triangle text-2xl text-yellow-500"></i>
      <div class="flex flex-col gap-2">
        <span>
          This will destroy your whole base and all of its units. This cannot be undone.
        </span>
        <span>
          A new base is then started automatically in your start region, and you keep playing
          with your current quest and level.
        </span>
        <span>
          Do you really want to give up your base?
        </span>
      </div>
    </div>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="showSurrenderWarning = false"></p-button>
      <p-button label="Give up base" icon="pi pi-flag" severity="danger" (onClick)="surrenderBase()"></p-button>
    </div>
  </div>
</p-dialog>
