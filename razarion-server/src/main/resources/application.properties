spring.application.name=razarion-server
spring.web.resources.static-locations=classpath:/homepage/,classpath:/static/,classpath:/generated/

server.http2.enabled=true

# GZIP Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,application/xml,text/html,text/xml,text/plain,text/css,application/wasm
server.compression.min-response-size=1024

# Graceful shutdown. Gives the restart announcement (ContextClosedEvent) time to reach the
# connected clients and the planet backup time to be written before the JVM dies. Must stay
# below the pod's terminationGracePeriodSeconds (k8s default 30s).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Mail settings
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Freemarker
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl

# logging.level.org.springframework.security=DEBUG
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Actuator - Health Probes for Kubernetes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Disable MongoDB health check (Atlas user lacks permission on 'local' db)
management.health.mongodb.enabled=false
# Disable Mail health check (no SMTP server on GCP)
management.health.mail.enabled=false

# Reddit Ads Conversions API (configured via env vars in production)
reddit.ads.pixel-id=${REDDIT_ADS_PIXEL_ID:}
reddit.ads.access-token=${REDDIT_ADS_ACCESS_TOKEN:}

# X (Twitter) Ads Conversion API / CAPI (configured via env vars in production).
# Auth is a single token (X-Pixel-Token header) generated in the X Ads Events Manager
# "Manual / Conversion API" setup. Both pixel-id and pixel-token must be set for events to
# be sent; otherwise the service logs in MOCK mode.
x.ads.api-version=${X_ADS_API_VERSION:12}
x.ads.pixel-id=${X_ADS_PIXEL_ID:}
x.ads.pixel-token=${X_ADS_PIXEL_TOKEN:}
# Optional event-tag ids created in the X Ads Events Manager (e.g. tw-o8z6j-o8z21).
# When empty, the funnel-step name is used as event_id (fine for MOCK logging).
x.ads.event.page-visit=${X_ADS_EVENT_PAGE_VISIT:}
x.ads.event.client-startup=${X_ADS_EVENT_CLIENT_STARTUP:}
x.ads.event.builder-deployed=${X_ADS_EVENT_BUILDER_DEPLOYED:}
x.ads.event.quest-passed=${X_ADS_EVENT_QUEST_PASSED:}
x.ads.event.level-up=${X_ADS_EVENT_LEVEL_UP:}

# Director mode (film the live world). Safe default OFF — DirectorController is
# only instantiated where this is true. Overridden to true ONLY in
# application-local.properties; prod inherits this false → endpoints absent.
razarion.director.enabled=false